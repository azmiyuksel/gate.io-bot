# Railway config for the LIVE trading SCHEDULER worker service.
#
# Point the scheduler service's "Config File" (Settings -> Config-as-code) at this
# path (relative to the service Root Directory `backend`):
#     railway.scheduler.toml
#
# Same Dockerfile/image as the API, overridden start command, and NO
# healthcheckPath (the worker has no HTTP server, so a /health probe would fail
# forever and Railway would restart-loop the container).
[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"

[deploy]
startCommand = "python -m app.workers.scheduler"
restartPolicyType = "always"
