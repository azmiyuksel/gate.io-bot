services:
  # ── Infrastructure (always runs) ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gatebot
      POSTGRES_USER: gatebot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gatebot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatebot -d gatebot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Server (always runs) ─────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Dashboard (always runs) ──────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    command: npm run dev
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # ── Paper Trading (always runs) ─────────────────────────────────
  paper-worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
    command: python -m app.workers.paper_worker
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_healthy

  # ── Live Trading (profiles: live) ────────────────────────────────
  scheduler:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    command: python -m app.workers.scheduler
    volumes:
      - ./backend:/app
    profiles: ["live"]
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
