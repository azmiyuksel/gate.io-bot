# Railway.app monorepo service MAP — reference only.
#
# IMPORTANT: Railway does NOT read multiple [services.*] blocks from a single
# root railway.toml. Config-as-code is PER SERVICE: in the Railway dashboard
# create one service per component, set its Root Directory, and point its config
# path at the railway.toml inside that directory. This file documents the
# intended topology; the AUTHORITATIVE configs are:
#
#   backend service   -> Root Directory: backend   config: railway.toml
#   paper-worker      -> Root Directory: backend   config: railway.worker.toml
#   frontend service  -> Root Directory: frontend  config: railway.toml
#
# Provision a Postgres and a Redis plugin and share DATABASE_URL / REDIS_URL with
# the backend + workers. Set ENVIRONMENT=production, SECRET_KEY and FERNET_KEY on
# the backend (and the same on the workers).

# ── Backend API server ──────────────────────────────────────
[services.backend]
path = "backend"
dockerfilePath = "backend/Dockerfile"
healthcheckPath = "/health"
healthcheckTimeout = 10
healthcheckInterval = 30
restartPolicyType = "always"

[services.backend.build]
builder = "dockerfile"

[services.backend.deploy]
numReplicas = 1
sleepApplication = false

# ── Paper Trading worker ────────────────────────────────────
[services.paper-worker]
path = "backend"
dockerfilePath = "backend/Dockerfile.worker"
restartPolicyType = "always"

[services.paper-worker.build]
builder = "dockerfile"

[services.paper-worker.deploy]
numReplicas = 1
sleepApplication = false

# ── Frontend dashboard ──────────────────────────────────────
[services.frontend]
path = "frontend"
dockerfilePath = "frontend/Dockerfile"
healthcheckPath = "/"
healthcheckTimeout = 10
healthcheckInterval = 30
restartPolicyType = "always"

[services.frontend.build]
builder = "dockerfile"
buildArgs = { }
# Set build-time vars in Railway dashboard:
#   NEXT_PUBLIC_API_URL  = https://{backend-domain}  (backend's public Railway URL)

[services.frontend.deploy]
numReplicas = 1
sleepApplication = false
